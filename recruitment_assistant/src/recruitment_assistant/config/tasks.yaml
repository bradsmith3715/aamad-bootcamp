# Recruitment Assistant — task definitions
# Source of truth: project-context/1.define/product-requirements-document.md
#   §3 Task Orchestration (T1-T5) and §4 Functional Requirements (F-2 ... F-5).
#
# Sequential main pass: sourcing_task -> parsing_task -> ranking_task -> coaching_task
#
# Kickoff inputs (bound at crew.kickoff time):
#   intent_prompt    - short career-intent prompt from the candidate
#   selected_job_id  - id of the role to coach on; the sentinel "top_ranked"
#                      means "coach on whichever role ranks first"
#
# Resume text: NOT interpolated. Registered via
# recruitment_assistant.tools.register_resume_text() before kickoff and
# retrieved by agents via the `resume_reader` tool. This removes the
# prompt-embedded escape hatch that let agents hallucinate extractions.
#
# Output schemas (bound via output_pydantic in crew.py):
#   sourcing_task -> JobList
#   parsing_task  -> ParsedBundle
#   ranking_task  -> RankedJobList
#   coaching_task -> CoachPlan
#
# HARD RULES (apply to EVERY task in this file):
#   1. Your FIRST action MUST be a tool call (Action: <tool_name>),
#      never a Final Answer. A turn-1 Final Answer is an invalid output.
#   2. Every record in the final output MUST trace to a specific tool
#      call made during this run. No paraphrasing, no synthesis, no
#      "filling in" missing fields, no reading raw text yourself.
#   3. "Empty" outputs (empty job list, empty parsed_jobs, empty
#      ranked_jobs, empty edits/gaps) are ONLY valid as a direct
#      consequence of tool results - never as a shortcut to avoid
#      calling tools.
#   4. Your Final Answer MUST be a single JSON object matching the
#      schema named in the task's expected_output - not Python repr,
#      not prose, not markdown code fences. A guardrail validates the
#      JSON; invalid output triggers a retry.

sourcing_task:
  description: >
    Discover 10 to 25 real tech job postings relevant to the candidate.

    Career intent:
    {intent_prompt}

    MANDATE: You MUST obtain jobs by calling BOTH live-feed tools,
    `job_feed_fetcher` and `remote_ok_fetcher`, and ONLY fall back to
    `demo_corpus_reader` if both live feeds return status="degraded".
    Your FIRST action in this task MUST be `Action: job_feed_fetcher`.
    Do NOT emit a Final Answer before observing at least two tool
    results. Do NOT invent companies, titles, URLs, or descriptions.

    Procedure:
    1. Invoke `job_feed_fetcher` with intent_prompt set to the career
       intent above and limit=10. If response.status is "ok" or
       "ok_unfiltered", capture response.jobs as hn_jobs; otherwise
       capture an empty list as hn_jobs.
    2. Invoke `remote_ok_fetcher` with the same intent_prompt and
       limit=10. If response.status is "ok" or "ok_unfiltered",
       capture response.jobs as ro_jobs; otherwise capture an empty
       list as ro_jobs.
    3. Concatenate the two captured lists in order: hn_jobs first,
       then ro_jobs. Preserve every Job record VERBATIM. Do not
       dedupe - each tool hashes its own IDs with a source prefix so
       collisions across sources will not occur.
    4. If the combined list is non-empty, that is your result and you
       STOP. Do NOT call demo_corpus_reader.
    5. If BOTH live responses had status="degraded" (combined list is
       empty), invoke `demo_corpus_reader` with the same intent_prompt
       and limit=12. Use its response.jobs as your result regardless
       of its status (a degraded demo corpus still returns its jobs
       field).

    Return a JobList whose `jobs` field contains the Job records
    exactly as returned by whichever tools succeeded. Preserve id,
    title, company, location, url, source, and raw_description
    VERBATIM. Do not rewrite, summarize, translate, or reformat any
    field. Do not drop jobs. Do not add jobs. Do not merge duplicates
    yourself.

    An empty `jobs` list is valid ONLY if all three tools were called
    and all returned zero jobs. If you have not called at least
    `job_feed_fetcher` and `remote_ok_fetcher`, an empty result is an
    invalid output.
  expected_output: >
    A single JSON object matching the JobList schema:
      {"jobs": [{"id": "...", "title": "...", "company": "...",
                  "location": "...", "url": "...", "source": "...",
                  "raw_description": "..."}, ...]}
    Each Job carries the EXACT id, title, company, location, url,
    source (e.g., "hn_whos_hiring", "remote_ok", "demo_corpus"), and
    raw_description returned by the tool. Zero fabricated records;
    every Job traces to a specific tool call made during this run.
    Return the JSON object alone - no prose, no markdown fences.
  agent: sourcing_agent

parsing_task:
  description: >
    Convert the candidate's resume and every sourced job description
    into strict structured records.

    MANDATE: You MUST use the `resume_reader` and `llm_structured_extract`
    tools. Your FIRST action in this task MUST be `Action: resume_reader`
    (no arguments). Do NOT emit a Final Answer before observing at least
    one tool result. Do NOT produce ParsedResume or ParsedJob records
    from memory or from the task description.

    The resume text is NOT in this prompt. You can only obtain it by
    calling `resume_reader`. If you try to produce a ParsedResume
    without first calling resume_reader, you have no source to ground
    the fields in - that is an invalid output.

    Procedure:
    1. Invoke `resume_reader` (no arguments) EXACTLY ONCE. Capture its
       string return value as `resume_text` for the next step.
    2. Invoke `llm_structured_extract` EXACTLY ONCE with:
         content = resume_text (the string from step 1)
         target  = "resume"
       Capture the returned `data` field as the ParsedResume for the
       bundle.
    3. For EVERY Job in the JobList produced by the sourcing_task,
       invoke `llm_structured_extract` EXACTLY ONCE with:
         content = that Job's raw_description
         target  = "job"
         job_id  = that Job's id
       Capture each returned `data` field as a ParsedJob and add it to
       the bundle. Process every Job in the list; do not skip any, do
       not batch them, do not deduplicate them.
    4. If a tool call returns status="degraded", include a ParsedJob for
       that Job with parse_status="degraded", the correct job_id, and
       empty lists for skills / must_have / nice_to_have. Do NOT fill in
       values yourself to "help" the downstream agents.

    Return a ParsedBundle containing the single ParsedResume and the
    full list of ParsedJob records (one per input Job, same order).
  expected_output: >
    A single JSON object matching the ParsedBundle schema:
      {"parsed_resume": {...ParsedResume fields...},
       "parsed_jobs":   [{...ParsedJob fields with job_id and
                           parse_status...}, ...]}
    One ParsedResume and exactly one ParsedJob per input Job (keyed by
    job_id). ParsedJob.parse_status is "ok" or "degraded". Every
    extracted field came from an llm_structured_extract call made
    during this run; the resume content came from resume_reader, not
    from the prompt. Return the JSON object alone - no prose, no
    markdown fences.
  agent: parser_agent
  context:
    - sourcing_task

ranking_task:
  description: >
    Produce a multi-criterion fit breakdown for every ParsedJob whose
    parse_status is "ok".

    MANDATE: You MUST use the `llm_structured_rank` tool for EVERY
    ranking. Your FIRST action in this task MUST be `Action:
    llm_structured_rank` (unless there are zero "ok" ParsedJobs, in
    which case you may emit a RankedJobList with ranked_jobs=[] and
    skipped_job_ids populated from "degraded" ParsedJobs). Do NOT
    produce RankedJob records from memory, from the task description,
    or by eyeballing the resume against the JD.

    Procedure:
    1. Serialize the ParsedResume from the parsing_task output as JSON.
       This is your parsed_resume_json argument for every tool call.
    2. For EACH ParsedJob in the parsing_task output whose parse_status
       is "ok":
       - Serialize the ParsedJob as JSON (parsed_job_json).
       - Invoke `llm_structured_rank` EXACTLY ONCE with parsed_resume_json
         and parsed_job_json. Do not retry on success, do not call a
         second time to "double-check".
       - If the tool response status is "ok", capture response.data as
         a RankedJob unchanged. Do not re-score, re-weight, or edit it.
       - If the status is "degraded" with code "job-parse-degraded",
         add the job_id to skipped_job_ids instead of fabricating a score.
    3. Collect the job_id of every ParsedJob whose parse_status is
       "degraded" into skipped_job_ids as well.
    4. Sort the RankedJob list by overall_score descending. Break ties
       on equal overall_score by job_id ascending (lexicographic). This
       sort is the ONLY post-processing you are permitted to do.

    Return a RankedJobList with the sorted ranked_jobs and the
    skipped_job_ids list.
  expected_output: >
    A single JSON object matching the RankedJobList schema:
      {"ranked_jobs":      [{...RankedJob with job_id, overall_score,
                              per-criterion breakdown...}, ...],
       "skipped_job_ids":  ["...", ...]}
    Sorted by overall_score descending with deterministic tie-breaks.
    Every RankedJob came from an llm_structured_rank call made during
    this run and is returned unchanged; zero were invented or re-scored.
    Return the JSON object alone - no prose, no markdown fences.
  agent: ranking_agent
  context:
    - parsing_task

coaching_task:
  description: >
    Produce evidence-grounded coaching for the role the candidate
    selected.

    MANDATE: You MUST use the `resume_reader` and `llm_structured_coach`
    tools. The resume text is NOT in this prompt; obtain it via
    `resume_reader`. Do NOT hand-write edits or gaps. Do NOT produce a
    CoachPlan from memory.

    Selected job id:
      {selected_job_id}

    Procedure:
    1. Determine the target RankedJob from the ranking_task output:
       - If selected_job_id is "top_ranked" or empty, use the FIRST
         RankedJob in RankedJobList.ranked_jobs (already sorted).
       - Otherwise, find the RankedJob in RankedJobList.ranked_jobs
         whose job_id equals selected_job_id.
       - If RankedJobList.ranked_jobs is empty, return an empty CoachPlan
         with job_id=selected_job_id, edits=[], gaps=[]. In THIS case
         only - the legitimate no-input case - you may skip all tool
         calls. Otherwise, your FIRST action MUST be `Action: resume_reader`.
    2. Invoke `resume_reader` (no arguments) EXACTLY ONCE. Capture its
       string return value as `resume_text` for the next step.
    3. Serialize the ParsedResume from the parsing_task output as JSON
       (parsed_resume_json).
    4. Serialize the target RankedJob as JSON (ranked_job_json).
    5. Invoke `llm_structured_coach` EXACTLY ONCE with:
         parsed_resume_json
         ranked_job_json
         resume_text = the string from step 2
    6. Return the tool's response.data as your CoachPlan, VERBATIM. Do
       not re-edit, re-order, or post-process the plan. Do not add edits
       or gaps. Do not merge gaps into edits. The tool has already
       enforced the schema and grounding invariants (every edit has a
       non-null evidence_span; gaps are kept strictly separate).
  expected_output: >
    A single JSON object matching the CoachPlan schema:
      {"job_id": "...",
       "edits":  [{...CoachEdit with non-null evidence_span...}, ...],
       "gaps":   [{...CoachGap...}, ...]}
    edits and gaps are strictly separate lists. The entire CoachPlan
    came from a single llm_structured_coach call made during this run
    and is returned unchanged; the resume content came from
    resume_reader, not from the prompt. Return the JSON object alone -
    no prose, no markdown fences.
  agent: coach_agent
  context:
    - ranking_task
